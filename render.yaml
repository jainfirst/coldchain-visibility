# Render blueprint — one-click deploy. In the Render dashboard:
#   New + -> Blueprint -> connect this repo -> Apply.
# Uses the Dockerfile, so the Python version and deps are fully pinned.
services:
  - type: web
    name: coldchain-visibility
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    # Optional: to make FedEx live, set these in the Render dashboard (Environment),
    # NOT here. The app runs fully off the cached snapshot + CSV without them.
    # envVars:
    #   - key: TIVE_BEARER_TOKEN
    #     sync: false
